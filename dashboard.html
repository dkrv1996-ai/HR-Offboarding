<!DOCTYPE html>
<html>
<head>
  <title>Employee Exit Dashboard</title>
  <style>
    body { font-family: Arial; background: #f4f6f9; margin: 0; padding: 0; }
    .nav { background: #1f2937; color: white; padding: 15px; font-size: 18px; font-weight: bold; }
    .container { padding: 20px; max-width: 1200px; margin: auto; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #000; padding: 8px; text-align: left; font-size: 14px; }
    th { background: #ddd; }
    button { padding: 5px 10px; margin-right: 5px; border: none; border-radius: 4px; cursor: pointer; }
    .approve { background: #28a745; color: white; }
    .reject { background: #dc3545; color: white; }
  </style>
</head>
<body>
<div class="nav">Employee Exit Dashboard</div>
<div class="container">
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Employee ID</th>
        <th>Department</th>
        <th>Reason</th>

        <th>Manager Approval</th>
        <th>Manager Remarks</th>

        <th>IT Approval</th>
        <th>IT Remarks</th>

        <th>Finance Approval</th>
        <th>Finance Remarks</th>

        <th>Admin Approval</th>
        <th>Admin Remarks</th>

        <th>Final HR Approval</th>
        <th>Final HR Remarks</th>

        <th>Status</th>
        <th>Last Approved By</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="body"></tbody>
  </table>
</div>

<script src="js/dashboard.js"></script>
</body>
</html>
