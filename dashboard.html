<!DOCTYPE html>
<html>
<head>
  <title>Exit Requests Dashboard</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f6f9;
    }

    .nav {
      background: #1f2937;
      padding: 15px;
      color: white;
      font-size: 18px;
      font-weight: bold;
    }

    .container {
      padding: 20px;
      max-width: 1100px;
      margin: auto;
    }

    .card {
      background: white;
      padding: 20px;
      margin-top: 20px;
      border-radius: 8px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      padding: 10px;
      border: 1px solid #ddd;
      text-align: center;
    }

    th {
      background: #f1f1f1;
    }

    button {
      padding: 6px 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin: 2px;
    }

    .viewBtn {
      background: #007bff;
      color: white;
    }

    .deleteBtn {
      background: #dc3545;
      color: white;
    }

    .remarkRow {
      background: #fafafa;
      font-size: 14px;
    }

    .backLink {
      margin-top: 20px;
      display: inline-block;
    }

  </style>
</head>

<body>

<div class="nav">
  Exit Requests Dashboard
</div>

<div class="container">
  <div class="card">
    <h3>All Exit Requests</h3>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Employee ID</th>
          <th>Department</th>
          <th>Reason</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="body">
      </tbody>
    </table>

    <a href="index.html" class="backLink">← Back to Home</a>

  </div>
</div>

<script src="js/dashboard.js"></script>

</body>
</html>
