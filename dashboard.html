<!DOCTYPE html>
<html>
<head>
  <title>Employee Exit Dashboard</title>
  <style>
    body { font-family: Arial; background: #f4f6f9; margin: 0; padding: 0; }
    .nav { background: #1f2937; color: white; padding: 15px; font-size: 18px; font-weight: bold; }
    .container { padding: 20px; max-width: 1200px; margin: auto; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #000; padding: 8px; text-align: left; font-size: 14px; }
    th { background: #ddd; }
    button { padding: 5px 10px; margin-right: 5px; border-radius: 4px; border: none; cursor: pointer; }
    .approve { background: #28a745; color: white; }
    .reject { background: #dc3545; color: white; }
  </style>
</head>
<body>
<div class="nav">Employee Exit Dashboard</div>
<div class="container">
  <table>
    <thead>
      <tr>
        <th>ID</th><th>Name</th><th>Employee ID</th><th>Department</th><th>Reason</th>
        <th>Manager Approval</th><th>Manager Remarks</th>
        <th>IT Approval</th><th>IT Remarks</th>
        <th>Finance Approval</th><th>Finance Remarks</th>
        <th>Admin Approval</th><th>Admin Remarks</th>
        <th>Final HR Approval</th><th>Final HR Remarks</th>
        <th>Status</th><th>Actions</th>
      </tr>
    </thead>
    <tbody id="body"></tbody>
  </table>
  <br>
  <a href="index.html">Create New Request</a>
</div>

<script>
function loadRequests() {
  return JSON.parse(localStorage.getItem('exitRequests') || '[]');
}

function renderDashboard() {
  const tbody = document.getElementById('body');
  const requests = loadRequests();
  tbody.innerHTML = '';

  if (!requests.length) {
    tbody.innerHTML = '<tr><td colspan="17">No requests found</td></tr>';
    return;
  }

  requests.forEach(r => {
    tbody.innerHTML += `<tr>
      <td>${r.id}</td>
      <td>${r.name}</td>
      <td>${r.empId}</td>
      <td>${r.department}</td>
      <td>${r.reason}</td>

      <td>${r.managerApproval}</td>
      <td>${r.managerRemarks || '-'}</td>

      <td>${r.itApproval}</td>
      <td>${r.itRemarks || '-'}</td>

      <td>${r.financeApproval}</td>
      <td>${r.financeRemarks || '-'}</td>

      <td>${r.adminApproval}</td>
      <td>${r.adminRemarks || '-'}</td>

      <td>${r.finalHrApproval}</td>
      <td>${r.finalHrRemarks || '-'}</td>

      <td>${r.status}</td>
      <td>
        <button onclick="viewRequest('${r.id}')">View</button>
        <button onclick="deleteRequest('${r.id}')">Delete</button>
      </td>
    </tr>`;
  });
}

function viewRequest(id) {
  window.location.href = 'view.html?id=' + id;
}

function deleteRequest(id) {
  if (!confirm('Are you sure you want to delete this request?')) return;
  const updated = loadRequests().filter(r => r.id !== id);
  localStorage.setItem('exitRequests', JSON.stringify(updated));
  renderDashboard();
}

renderDashboard();
</script>
</body>
</html>
