<!DOCTYPE html>
<html>
<head>
  <title>IT Approval</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <h2>IT Department - Asset & Access Clearance</h2>
</header>

<div class="container">
<div class="card">

<label>Select Request</label>
<select id="reqSelect"></select>

<div id="details"></div>

<h3>IT Clearance Checklist</h3>

<label>ID Access Blocked?</label>
<select id="idBlocked">
  <option value="Yes">Yes</option>
  <option value="No">No</option>
</select>

<label>Laptop Returned?</label>
<select id="laptopReturn">
  <option value="Yes">Yes</option>
  <option value="No">No</option>
</select>

<label>Email Disabled?</label>
<select id="emailBlocked">
  <option value="Yes">Yes</option>
  <option value="No">No</option>
</select>

<label>ERP Access Blocked?</label>
<select id="erpBlocked">
  <option value="Yes">Yes</option>
  <option value="No">No</option>
</select>

<label>IT Comments</label>
<textarea id="comment" placeholder="Enter IT remarks"></textarea>

<br>
<button onclick="approve()" class="btn-success">Approve</button>
<button onclick="reject()" class="btn-danger">Reject</button>

</div>
</div>

<script>
const ROLE = "IT";
</script>

<script src="js/storage.js"></script>
<script src="js/workflow.js"></script>
<script src="js/approval.js"></script>

</body>
</html>
