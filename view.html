<!DOCTYPE html>
<html>
<head>
  <title>View Exit Requests</title>
  <style>
    table { width: 100%; border-collapse: collapse; }
    th, td { border: 1px solid #ccc; padding: 5px; text-align: left; }
    tr.remark { font-size: 0.9em; background: #f9f9f9; }
    button { margin: 2px; }
  </style>
</head>
<body>
  <h2>All Exit Requests</h2>
  <button onclick="window.print()">Print</button>
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Emp ID</th>
        <th>Dept</th>
        <th>LWD</th>
        <th>Reason</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="body">
      <!-- JS will populate requests and comments here -->
    </tbody>
  </table>
  <script src="view.js"></script>
</body>
</html>
