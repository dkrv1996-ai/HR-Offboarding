<!DOCTYPE html>
<html>
<head>
  <title>View Exit Request</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="nav">
  <span>Exit Request Details</span>
  <button class="logout-btn" onclick="logout()">Logout</button>
</div>
<div class="container">
  <div class="card">

    <table>
      <tr><th>ID</th><td id="id"></td></tr>
      <tr><th>Name</th><td id="name"></td></tr>
      <tr><th>Employee ID</th><td id="empId"></td></tr>
      <tr><th>Department</th><td id="dept"></td></tr>
      <tr><th>Reason</th><td id="reason"></td></tr>

      <tr><th>Manager Approval</th><td id="manager"></td></tr>
      <tr><th>IT Approval</th><td id="it"></td></tr>
      <tr><th>Asset Return</th><td id="asset"></td></tr>
      <tr><th>Finance Approval</th><td id="finance"></td></tr>
      <tr><th>HR Approval</th><td id="hr"></td></tr>

      <tr><th>Final Status</th><td id="status"></td></tr>
    </table>

    <h3>Approval History</h3>
    <div id="history"></div>

    <br>
    <button onclick="printRequest()">Print</button>
    <a href="dashboard.html" class="backLink">← Back to Dashboard</a>

  </div>
</div>

<script src="view.js"></script>
</body>
</html>
