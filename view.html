<!DOCTYPE html>
<html>
<head>
  <title>Exit Request Details</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }

    .card {
      border: 1px solid #ddd;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .badge {
      padding: 5px 10px;
      border-radius: 5px;
      color: white;
      font-size: 12px;
    }

    .approved { background: #16a34a; }
    .rejected { background: #dc2626; }
    .in-progress { background: #f59e0b; }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 8px;
    }

    h2 {
      margin-bottom: 10px;
    }

    button {
      padding: 8px 15px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h2>Exit Request Details</h2>

  <button onclick="window.print()">Print</button>

  <div class="card" id="details"></div>

  <h3>Approval History</h3>
  <table>
    <thead>
      <tr>
        <th>Role</th>
        <th>Action</th>
        <th>Comment</th>
        <th>Date</th>
      </tr>
    </thead>
    <tbody id="historyBody"></tbody>
  </table>

  <script src="view.js"></script>
</body>
</html>
