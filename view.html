<!DOCTYPE html>
<html>
<head>
  <title>Approval Workflow</title>
  <style>
    body { font-family: Arial; margin:0; padding:0; background:#f4f6f9; }
    .card { background:white; padding:20px; margin:20px auto; border-radius:8px; max-width:900px; box-shadow:0 3px 10px rgba(0,0,0,0.1);}
    .approvalSection { display:none; }
    textarea, select { width:100%; padding:8px; margin:5px 0 10px 0; }
    button { padding:8px 15px; margin-right:5px; border:none; border-radius:4px; cursor:pointer;}
    .approve { background:#28a745; color:white; }
    .reject { background:#dc3545; color:white; }
  </style>
</head>
<body>

<div class="card">
  <h2>Approval Workflow</h2>

  <!-- Manager -->
  <div id="managerSection" class="approvalSection card">
    <h3>Manager Approval</h3>
    <textarea id="managerComment" placeholder="Enter Manager Remarks"></textarea>
    <button onclick="approveStep('Manager')" class="approve">Approve</button>
    <button onclick="rejectStep('Manager')" class="reject">Reject</button>
  </div>

  <!-- IT -->
  <div id="itSection" class="approvalSection card">
    <h3>IT Clearance</h3>
    <label>Assets Returned</label>
    <select id="assetReturn">
      <option value="Yes">Yes</option>
      <option value="No">No</option>
    </select>
    <label>ID Blocked</label>
    <select id="IdBlocked">
      <option value="Yes">Yes</option>
      <option value="No">No</option>
    </select>
    <textarea id="itComment" placeholder="Enter IT Remarks"></textarea>
    <button onclick="approveStep('IT')" class="approve">Approve</button>
    <button onclick="rejectStep('IT')" class="reject">Reject</button>
  </div>

  <!-- Finance -->
  <div id="financeSection" class="approvalSection card">
    <h3>Finance Clearance</h3>
    <label>Pending Dues</label>
    <select id="financeDue">
      <option value="No Due">No Due</option>
      <option value="Pending Due">Pending Due</option>
    </select>
    <textarea id="financeComment" placeholder="Enter Finance Remarks"></textarea>
    <button onclick="approveStep('Finance')" class="approve">Approve</button>
    <button onclick="rejectStep('Finance')" class="reject">Reject</button>
  </div>

  <!-- Admin -->
  <div id="adminSection" class="approvalSection card">
    <h3>Admin Clearance</h3>
    <textarea id="adminComment" placeholder="Enter Admin Remarks"></textarea>
    <button onclick="approveStep('Admin')" class="approve">Approve</button>
    <button onclick="rejectStep('Admin')" class="reject">Reject</button>
  </div>

  <!-- Final HR -->
  <div id="finalHrSection" class="approvalSection card">
    <h3>Final HR Closure</h3>
    <textarea id="finalhrComment" placeholder="Enter Final HR Remarks"></textarea>
    <button onclick="approveStep('FinalHR')" class="approve">Complete Process</button>
  </div>

  <br>
  <button onclick="printRequest()">Print Approval</button>
  <a href="dashboard.html">Go To Dashboard</a>
</div>

<script src="js/workflow.js"></script>
</body>
</html>
