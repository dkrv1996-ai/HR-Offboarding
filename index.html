<!DOCTYPE html>
<html>
<head>
  <title>Employee Exit Management System</title>
  <style>
    body { font-family: Arial; margin: 0; background: #f4f6f9; }
    .nav { background: #1f2937; padding: 15px; color: white; font-size: 18px; font-weight: bold; }
    .container { padding: 20px; max-width: 900px; margin: auto; }
    .card { background: white; padding: 20px; margin-top: 20px; border-radius: 8px; box-shadow: 0 3px 10px rgba(0,0,0,0.1); }
    input, select, textarea { width: 100%; padding: 8px; margin-top: 5px; margin-bottom: 10px; }
    button { padding: 8px 15px; margin-right: 5px; border: none; border-radius: 4px; cursor: pointer; }
    .approve { background: #28a745; color: white; }
    .reject { background: #dc3545; color: white; }
    .approvalSection { display: none; }
  </style>
</head>
<body>

<div class="nav">Employee Exit Management System</div>

<div class="container">

  <!-- CREATE REQUEST -->
  <div class="card">
    <h3>Create Exit Request</h3>

    <label>Employee Name</label>
    <input type="text" id="empName">

    <label>Employee ID</label>
    <input type="text" id="empId">

    <label>Department</label>
    <input type="text" id="empDept">

    <label>Manager ID</label>
    <input type="text" id="managerId">

    <label>Finance Officer ID</label>
    <input type="text" id="financeId">

    <label>IT Officer ID</label>
    <input type="text" id="itIdAssign">

    <label>Admin Officer ID</label>
    <input type="text" id="adminIdAssign">

    <label>Reason for Exit</label>
    <select id="empReason">
      <option value="">-- Select Reason --</option>
      <option>Resignation</option>
      <option>Termination</option>
      <option>Retirement</option>
    </select>
    <button type="button" onclick="createRequest()" class="approve">Submit Request</button>
  </div>

  <!-- MANAGER -->
  <div id="managerSection" class="card approvalSection">
    <h3>Manager Approval</h3>
    <textarea id="managerComment" placeholder="Manager Comment"></textarea>
    <button onclick="approveStep('Manager')" class="approve">Approve</button>
    <button onclick="rejectStep('Manager')" class="reject">Reject</button>
  </div>

  <!-- FINANCE -->
  <div id="financeSection" class="card approvalSection">
    <h3>Finance Clearance</h3>
    <label>Pending Dues</label>
    <select id="financeDue">
      <option value="No Due">No Due</option>
      <option value="Pending Due">Pending Due</option>
    </select>
    <label>Settlement</label>
    <select id="settlementDue">
      <option value="Yes">Yes</option>
      <option value="No">No</option>
    </select>
    <textarea id="financeComment" placeholder="Finance Comment"></textarea>
    <button onclick="approveStep('Finance')" class="approve">Approve</button>
    <button onclick="rejectStep('Finance')" class="reject">Reject</button>
  </div>

  <!-- IT -->
  <div id="itSection" class="card approvalSection">
    <h3>IT Clearance</h3>
    <label>Assets Returned</label>
    <select id="assetReturn">
      <option value="Yes">Yes</option>
      <option value="No">No</option>
    </select>
    <label>ID Blocked</label>
    <select id="idBlocked">
      <option value="Yes">Yes</option>
      <option value="No">No</option>
    </select>
    <textarea id="itComment" placeholder="IT Comment"></textarea>
    <button onclick="approveStep('IT')" class="approve">Approve</button>
    <button onclick="rejectStep('IT')" class="reject">Reject</button>
  </div>

  <!-- ADMIN -->
  <div id="adminSection" class="card approvalSection">
    <h3>Admin Clearance</h3>
    <label>ID Returned</label>
    <select id="idReturned">
      <option value="Yes">Yes</option>
      <option value="No">No</option>
    </select>
    <label>ID Blocked</label>
    <select id="idBlockedAdmin">
      <option value="Yes">Yes</option>
      <option value="No">No</option>
    </select>
    <textarea id="adminComment" placeholder="Admin Comment"></textarea>
    <button onclick="approveStep('Admin')" class="approve">Approve</button>
    <button onclick="rejectStep('Admin')" class="reject">Reject</button>
  </div>

  <!-- FINAL HR -->
  <div id="finalHrSection" class="card approvalSection">
    <h3>Final HR Closure</h3>
    <label>Exit Interview Done</label>
    <select id="exitInterview">
      <option value="Yes">Yes</option>
      <option value="No">No</option>
    </select>
    <label>Final Settlement Done</label>
    <select id="finalSettlementDone">
      <option value="Yes">Yes</option>
      <option value="No">No</option>
    </select>
    <textarea id="hrComment" placeholder="Final HR Comment"></textarea>
    <button onclick="approveStep('FinalHR')" class="approve">Complete Process</button>
  </div>

  <br>
  <a href="dashboard.html">Go To Dashboard</a>
</div>

<script src="js/workflow.js"></script>
</body>
</html>
