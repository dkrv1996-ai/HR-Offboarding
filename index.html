<!DOCTYPE html>
<html>
<head>
  <title>Employee Exit Request</title>
  <style>
    body { font-family: Arial; background: #f4f6f9; padding: 0; margin: 0; }
    .nav { background: #1f2937; color: white; padding: 15px; font-size: 18px; font-weight: bold; }
    .container { max-width: 900px; margin: auto; padding: 20px; }
    input, select, textarea { width: 100%; padding: 8px; margin: 5px 0 10px; }
    button { padding: 8px 15px; margin-right: 5px; border-radius: 4px; border: none; cursor: pointer; background: #28a745; color: white; }
    h3 { margin-top: 0; }
  </style>
</head>
<body>
<div class="nav">Employee Exit Management System</div>
<div class="container">
  <h3>Create Exit Request</h3>
  <label>Employee Name</label>
  <input type="text" id="empName" placeholder="Enter employee name">

  <label>Employee ID</label>
  <input type="text" id="empId" placeholder="Enter employee ID">

  <label>Department</label>
  <input type="text" id="empDept" placeholder="Enter department">

  <label>Manager ID</label>
  <input type="text" id="managerId" placeholder="Manager ID">

  <label>IT Officer ID</label>
  <input type="text" id="itIdAssign" placeholder="IT Officer ID">

  <label>Finance Officer ID</label>
  <input type="text" id="financeId" placeholder="Finance Officer ID">

  <label>Admin Officer ID</label>
  <input type="text" id="adminIdAssign" placeholder="Admin Officer ID">

  <label>Reason for Exit</label>
  <select id="empReason">
    <option value="">-- Select Reason --</option>
    <option>Resignation</option>
    <option>Termination</option>
    <option>Retirement</option>
  </select>

  <button onclick="createRequest()">Submit Request</button>
  <br><br>
  <a href="dashboard.html">Go to Dashboard</a>
</div>

<script>
function createRequest() {
  const name = document.getElementById('empName').value.trim();
  const empId = document.getElementById('empId').value.trim();
  const dept = document.getElementById('empDept').value.trim();
  const managerId = document.getElementById('managerId').value.trim();
  const itId = document.getElementById('itIdAssign').value.trim();
  const financeId = document.getElementById('financeId').value.trim();
  const adminId = document.getElementById('adminIdAssign').value.trim();
  const reason = document.getElementById('empReason').value;

  if (!name || !empId || !dept || !managerId || !itId || !financeId || !adminId || !reason) {
    alert('Please fill all fields.');
    return;
  }

  const request = {
    id: 'REQ' + Date.now(),
    name,
    empId,
    department: dept,
    reason,
    managerId,
    itIdAssign: itId,
    financeId,
    adminId,
    status: 'New',
    managerApproval: 'Pending',
    itApproval: 'Pending',
    financeApproval: 'Pending',
    adminApproval: 'Pending',
    finalHrApproval: 'Pending',
    managerRemarks: '',
    itRemarks: '',
    financeRemarks: '',
    adminRemarks: '',
    finalHrRemarks: '',
    history: []
  };

  const requests = JSON.parse(localStorage.getItem('exitRequests') || '[]');
  requests.push(request);
  localStorage.setItem('exitRequests', JSON.stringify(requests));

  alert('Request submitted successfully!');
  window.location.href = 'dashboard.html';
}
</script>
</body>
</html>
