<!DOCTYPE html>
<html>
<head>
  <title>Print Exit Requests</title>
  <style>
    table { width: 100%; border-collapse: collapse; }
    td, th { border: 1px solid #ccc; padding: 8px; text-align: left; }
    button { margin: 2px; }
    tr:nth-child(even) { background: #f2f2f2; }
  </style>
</head>
<body>
  <h2>All Exit Requests with Remarks</h2>
  <button onclick="printAll()">Print</button>
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Emp ID</th>
        <th>Dept</th>
        <th>LWD</th>
        <th>Reason</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="body">
      <!-- JS will populate requests and comments here -->
    </tbody>
  </table>

  <script src="print.js"></script>
</body>
</html>
