<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Employee Exit Approval</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    .department { border: 1px solid #ccc; padding: 15px; margin-bottom: 15px; border-radius: 5px; }
    .department label { display: block; margin-bottom: 5px; font-weight: bold; }
    .department input[type="text"] { width: 100%; padding: 5px; margin-bottom: 10px; }
    .department button { padding: 5px 10px; margin-right: 5px; cursor: pointer; }
    .approveBtn { background-color: #4CAF50; color: white; border: none; border-radius: 3px; }
    .rejectBtn { background-color: #f44336; color: white; border: none; border-radius: 3px; }
    h2 { text-align: center; }
  </style>
</head>
<body>
<h2>Employee Exit Approval</h2>

<!-- Approval Section -->
<div id="approvalSection" data-request-id="REQ123">

 <!-- Manager -->
<textarea id="managerRemarks" placeholder="Enter Manager remarks"></textarea>
<button onclick="approveStep('Manager')">Approve</button>
<button onclick="rejectStep('Manager')">Reject</button>

<!-- IT -->
<textarea id="itRemarks" placeholder="Enter IT remarks"></textarea>
<button onclick="approveStep('IT')">Approve</button>
<button onclick="rejectStep('IT')">Reject</button>

<!-- Finance -->
<textarea id="financeRemarks" placeholder="Enter Finance remarks"></textarea>
<input type="hidden" id="financeDue" value="No Due">
<button onclick="approveStep('Finance')">Approve</button>
<button onclick="rejectStep('Finance')">Reject</button>

<!-- Admin -->
<textarea id="adminRemarks" placeholder="Enter Admin remarks"></textarea>
<button onclick="approveStep('Admin')">Approve</button>
<button onclick="rejectStep('Admin')">Reject</button>

<!-- Final HR -->
<textarea id="finalhrRemarks" placeholder="Enter Final HR remarks"></textarea>
<button onclick="approveStep('Final HR')">Approve</button>
<button onclick="rejectStep('Final HR')">Reject</button>

<!-- Include Approval JS -->
<script src="js/approval.js"></script>

</body>
</html>
