<!DOCTYPE html>
<html>
<head>
  <title>Admin Approval</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header>
  <h2>Admin Department - Physical Access Clearance</h2>
</header>

<div class="container">
<div class="card">

<label>Select Request</label>
<select id="reqSelect"></select>

<div id="details"></div>

<h3>Admin Clearance Checklist</h3>

<label>ID Card Collected?</label>
<select id="idCardTaken">
  <option value="Yes">Yes</option>
  <option value="No">No</option>
</select>

<label>Entry Access Blocked?</label>
<select id="entryBlocked">
  <option value="Yes">Yes</option>
  <option value="No">No</option>
</select>

<label>Parking Access Removed?</label>
<select id="parkingRemoved">
  <option value="Yes">Yes</option>
  <option value="No">No</option>
</select>

<label>Admin Comments</label>
<textarea id="comment" placeholder="Enter admin remarks"></textarea>

<br>
<button onclick="approve()" class="btn-success">Approve</button>
<button onclick="reject()" class="btn-danger">Reject</button>

</div>
</div>
<script>
const ROLE = "Admin";
</script>

<script src="js/storage.js"></script>
<script src="js/workflow.js"></script>
<script src="js/approval.js"></script>

</body>
</html>
